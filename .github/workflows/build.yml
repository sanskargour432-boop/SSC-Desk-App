name: Make Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip the App
        run: |
          unzip *.zip -d myapp
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Convert to Android
        run: |
          cd myapp
          npm install
          npm install @capacitor/cli @capacitor/android
          npx cap add android
          npx cap sync android

      - name: Build the APK File
        run: |
          cd myapp/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Provide APK Download
        uses: actions/upload-artifact@v4
        with:
          name: SSC-Desk-Premium-APK
          path: myapp/android/app/build/outputs/apk/debug/app-debug.apk
          
