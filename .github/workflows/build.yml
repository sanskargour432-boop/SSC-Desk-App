name: Make Android APK and AAB

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip the App
        run: |
          unzip *.zip -d myapp
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Convert to Android & Fixes
        run: |
          cd myapp
          npm install
          npm install @capacitor/cli @capacitor/android @capacitor-community/admob @capacitor/assets
          npx cap add android
          
          # 🔥 FIX 1: App Crash Fix (Safe AdMob Injection)
          sed -i 's|</application>|<meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-7377091766113250~6802900116"/>\n    </application>|g' android/app/src/main/AndroidManifest.xml
          
          # 🔥 FIX 2: JS Initialize Fix
          find www -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's/await AdMob.prepareInterstitial/await AdMob.initialize(); await AdMob.prepareInterstitial/g' {} +
          
          # 🔥 FIX 3: Auto-Generate App Icons (6 Sizes Automatically)
          mkdir -p assets
          cp www/logo.png assets/icon.png
          cp www/logo.png assets/splash.png
          npx @capacitor/assets generate --android
          
          # 🔥 FIX 4: Show Status Bar (Battery/Time) Fix
          sed -i 's|<item name="android:windowFullscreen">true</item>|<item name="android:windowFullscreen">false</item>|g' android/app/src/main/res/values/styles.xml || true
          sed -i 's|<style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">|<style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">\n        <item name="android:windowFullscreen">false</item>|g' android/app/src/main/res/values/styles.xml || true
          
          # 🔥 FIX 5: Google Sign-In Fix (Copying Firebase Identity File)
          cp ../google-services.json android/app/
          
          npx cap sync android

      - name: Build the APK and AAB Files
        run: |
          cd myapp/android
          chmod +x gradlew
          ./gradlew assembleDebug
          ./gradlew bundleDebug

      - name: Provide App Files (APK & AAB)
        uses: actions/upload-artifact@v4
        with:
          name: SSC-Desk-App-Files
          path: |
            myapp/android/app/build/outputs/apk/debug/app-debug.apk
            myapp/android/app/build/outputs/bundle/debug/app-debug.aab
